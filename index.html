<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Truth Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primaryBlue: #2563eb;
            --lightBlue: #eff6ff;
            --darkBlue: #1e3a8a;
            --textMain: #0f172a;
            --textMuted: #475569;
            --successGreen: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
        }

        body {
            background-color: transparent;
            color: var(--textMain);
            width: 800px;
            height: 450px;
            overflow: hidden;
            position: relative;
        }

        .app-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #f8fafc;
            border-radius: 24px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            overflow: hidden;
            position: relative;
        }

        .bg-flare-1 {
            position: absolute;
            top: -50px;
            left: -50px;
            width: 300px;
            height: 300px;
            background: var(--primaryBlue);
            opacity: 0.08;
            filter: blur(60px);
            border-radius: 50%;
            z-index: 0;
        }

        .bg-flare-2 {
            position: absolute;
            bottom: -100px;
            right: -50px;
            width: 400px;
            height: 400px;
            background: var(--successGreen);
            opacity: 0.05;
            filter: blur(70px);
            border-radius: 50%;
            z-index: 0;
        }

        .app-header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            -webkit-app-region: drag;
            position: relative;
            z-index: 10;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-globe-placeholder {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-image: radial-gradient(var(--primaryBlue) 20%, transparent 20%), radial-gradient(var(--primaryBlue) 20%, transparent 20%);
            background-size: 8px 8px;
            background-position: 0 0, 4px 4px;
            opacity: 0.8;
        }

        .brand-nexus {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 0.5px;
            color: var(--darkBlue);
        }

        .brand-truth {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 0.5px;
            color: var(--primaryBlue);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--textMuted);
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            -webkit-app-region: no-drag;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ef4444;
        }

        .main-content {
            display: flex;
            flex-direction: row;
            flex: 1;
            padding: 25px 30px;
            gap: 30px;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 40px -10px rgba(37, 99, 235, 0.1);
        }

        .status-column {
            flex: 0 0 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .status-box {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            border: 6px solid #00ff66; 
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.3), inset 0 0 15px rgba(0, 255, 102, 0.1);
            transition: all 0.3s ease;
        }

        .status-box.stopped {
            border-color: #94a3b8;
            box-shadow: 0 10px 25px rgba(148, 163, 184, 0.15), inset 0 0 0 transparent;
        }

        .status-text {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--textMuted);
            letter-spacing: 1px;
        }

        .status-value {
            font-size: 26px;
            font-weight: 800;
            color: #00cc52;
            margin-top: 5px;
        }

        .status-box.stopped .status-value {
            color: var(--textMuted);
        }

        .controls-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .metrics-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .metric-card {
            flex: 1;
            padding: 18px 15px;
            text-align: left;
        }

        .metric-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--textMuted);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 15px;
            font-weight: 800;
            color: var(--textMain);
        }

        .control-card {
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .control-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--textMain);
        }

        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toggle-label {
            font-size: 18px;
            font-weight: 800;
            color: #00cc52;
            width: 40px;
            text-align: right;
        }

        .toggle-label.off {
            color: var(--textMuted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 32px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-toggle {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .3s;
            border-radius: 34px;
        }

        .slider-toggle:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        input:checked + .slider-toggle {
            background-color: #00ff66;
        }

        input:checked + .slider-toggle:before {
            transform: translateX(28px);
        }

        .slider-row {
            display: flex;
            flex-direction: column;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .idiot-proof-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--textMuted);
            margin-top: 4px;
        }

        .percentage-indicator {
            font-size: 22px;
            font-weight: 800;
            color: var(--primaryBlue);
        }

        .power-slider {
            width: 100%;
            accent-color: var(--primaryBlue);
            cursor: pointer;
            height: 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="bg-flare-1"></div>
        <div class="bg-flare-2"></div>

        <div class="app-header">
            <div class="brand-container">
                <div class="logo-globe-placeholder"></div>
                <div class="brand">
                    <span class="brand-nexus">NEXUS</span> <span class="brand-truth">TRUTH</span>
                </div>
            </div>
            <button class="close-btn" id="closeBtn">✕</button>
        </div>

        <div class="main-content">
            <div class="status-column glass-card">
                <div class="status-box" id="statusRing">
                    <span class="status-text">System Status</span>
                    <span class="status-value" id="statusLabel">ACTIVE</span>
                </div>
            </div>

            <div class="controls-column">
                <div class="metrics-row">
                    <div class="metric-card glass-card">
                        <div class="metric-label">Network Supply</div>
                        <div class="metric-value">1,000,000,000 NXUS</div>
                    </div>
                    <div class="metric-card glass-card">
                        <div class="metric-label">Total Balance</div>
                        <div class="metric-value" id="totalLabel">12,450.00 NXUS</div>
                    </div>
                    <div class="metric-card glass-card">
                        <div class="metric-label">Session Earned</div>
                        <div class="metric-value" id="sessionLabel">0.00 NXUS</div>
                    </div>
                </div>

                <div class="control-card glass-card">
                    <div class="toggle-row">
                        <div class="control-title">AI Processing</div>
                        <div class="toggle-wrapper">
                            <span class="toggle-label" id="toggleStateText">ON</span>
                            <label class="switch">
                                <input type="checkbox" id="engineToggle" checked>
                                <span class="slider-toggle"></span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="slider-row">
                        <div class="slider-header">
                            <div>
                                <div class="control-title">Compute Allocation</div>
                                <div class="idiot-proof-text">Select how much power you want to be used for computing in background</div>
                            </div>
                            <span class="percentage-indicator" id="sliderValue">50%</span>
                        </div>
                        <input type="range" id="powerSlider" class="power-slider" min="10" max="90" value="50">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const engineToggle = document.getElementById('engineToggle');
        const toggleStateText = document.getElementById('toggleStateText');
        const statusRing = document.getElementById('statusRing');
        const statusLabel = document.getElementById('statusLabel');
        const powerSlider = document.getElementById('powerSlider');
        const sliderValue = document.getElementById('sliderValue');
        const totalLabel = document.getElementById('totalLabel');
        const sessionLabel = document.getElementById('sessionLabel');
        const closeBtn = document.getElementById('closeBtn');

        powerSlider.addEventListener('input', (e) => {
            sliderValue.innerText = e.target.value + '%';
        });

        closeBtn.addEventListener('click', () => {
            window.close();
        });

        engineToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                statusRing.classList.remove('stopped');
                statusLabel.innerText = 'ACTIVE';
                toggleStateText.innerText = 'ON';
                toggleStateText.classList.remove('off');
            } else {
                statusRing.classList.add('stopped');
                statusLabel.innerText = 'PAUSED';
                toggleStateText.innerText = 'OFF';
                toggleStateText.classList.add('off');
            }
        });

        let sessionBalance = 0.00;
        let totalBalance = 12450.00;

        setInterval(() => {
            if (engineToggle.checked) {
                const speedMultiplier = powerSlider.value / 50;
                const incrementalEarn = 0.01 * speedMultiplier;
                
                sessionBalance += incrementalEarn;
                totalBalance += incrementalEarn;
                
                sessionLabel.innerText = sessionBalance.toFixed(2) + ' NXUS';
                totalLabel.innerText = totalBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' NXUS';
            }
        }, 3000);
    </script>
</body>
</html>
